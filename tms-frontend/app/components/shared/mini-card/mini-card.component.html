<mat-card-header class="card-header">
  <div class="card-icon">
    <mat-icon style="color: {{ color }}" class="avatar-icon">{{
      icon
    }}</mat-icon>
  </div>
  <mat-card-title>
    <h1 class="value-text">
      {{ valueText }}
    </h1>
  </mat-card-title>
</mat-card-header>
<h3 class="title-text">{{ title }}</h3>
