<div id="user-table" class="mat-elevation-z8">
  <h1 style="text-align: center">All Feedback Given To You</h1>
  <mat-form-field appearance="standard">
    <mat-label>Filter</mat-label>
    <input
      matInput
      (keyup)="applyFilter($event)"
      placeholder="Ex. Mia"
      #input
    />
  </mat-form-field>

  <table mat-table [dataSource]="dataSource" matSort>
    <ng-container matColumnDef="feedbackData">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Feedback</th>
      <td mat-cell *matCellDef="let row">{{ row.feedbackData | titlecase }}</td>
    </ng-container>

    <ng-container matColumnDef="studentId">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Student ID</th>
      <td mat-cell *matCellDef="let row">{{ row.studentId }}</td>
    </ng-container>

    <ng-container matColumnDef="feedbackDate">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
      <td mat-cell *matCellDef="let row">{{ row.feedbackDate }}</td>
    </ng-container>

    <ng-container matColumnDef="rating">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        <mat-icon style="color: gold">star </mat-icon>
        &nbsp; Rating
      </th>
      <td mat-cell *matCellDef="let row">
        <mat-icon *ngFor="let in of counter(row.rating)" style="color: gold">
          star</mat-icon
        >
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

    <!-- Row shown when there is no matching data. -->
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="12">No data available!</td>
    </tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]"></mat-paginator>
</div>
