<div id="user-table" class="mat-elevation-z8" fxFlex fxLayout="column">
  <h1>All Users</h1>
  <mat-form-field appearance="standard">
    <mat-label>Filter</mat-label>
    <input
      matInput
      (keyup)="applyFilter($event)"
      placeholder="Ex. Mia"
      #input
    />
  </mat-form-field>

  <table mat-table [dataSource]="dataSource" matSort>
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>User ID</th>
      <td mat-cell *matCellDef="let row">{{ row.id }}</td>
    </ng-container>

    <ng-container matColumnDef="fullName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Full Name</th>
      <td mat-cell *matCellDef="let row">{{ row.fullName | titlecase }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
      <td mat-cell *matCellDef="let row">{{ row.status }}</td>
    </ng-container>

    <ng-container matColumnDef="role">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Role</th>
      <td mat-cell *matCellDef="let row">
        {{ row.role }}
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Actions</th>
      <td mat-cell *matCellDef="let row">
        <div>
          <button
            mat-raised-button
            color="primary"
            type="button"
            *ngIf="row.role == 'Tutor' && row.status == 'ACCEPTED'"
            routerLink="/download-files/{{ row.id }}"
            matTooltip="View Content"
          >
            <mat-icon>folder_shared</mat-icon>
          </button>
          <button
            mat-raised-button
            color="primary"
            type="button"
            *ngIf="row.status != 'ACCEPTED' && row.status != 'REJECTED'"
            (click)="onAccept(row.id)"
            matTooltip="Accept User"
          >
            <mat-icon>person_add_alt</mat-icon>
          </button>
          <button
            mat-raised-button
            color="accent"
            type="button"
            *ngIf="row.status == 'PENDING'"
            (click)="onReject(row.id)"
            matTooltip="Reject User"
          >
            <mat-icon>person_off</mat-icon>
          </button>
          <button
            mat-raised-button
            color="warn"
            type="button"
            (click)="onDelete(row.id)"
            matTooltip="Remove User"
          >
            <mat-icon>person_remove</mat-icon>
          </button>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

    <!-- Row shown when there is no matching data. -->
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="12">No data available!</td>
    </tr>
  </table>

  <mat-paginator [pageSizeOptions]="[10, 25, 100]"></mat-paginator>
</div>
