
spring.application.name=TMS

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

logging.level.com.netflix.eureka=OFF
logging.level.com.netflix.discovery=OFF

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.healthcheck.enabled=true
eureka.instance.leaseRenewalIntervalInSeconds= 1
eureka.instance.leaseExpirationDurationInSeconds= 2



#DB Config
spring.datasource.url=jdbc:mysql://localhost:3306/demoProject?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#JWT Config
jwt.secret=this-is-a-really-long-secret
jwt.jwtExpirationInMs=18000000
jwt.refreshExpirationDateInMs=9000000
spring.expiresInSeconds=18000
server.servlet.context-path=/api

#SSL Config
server.ssl.enabled=true
# The format used for the keystore. It could be set to JKS in case it is a JKS file
server.ssl.key-store-type=PKCS12
# The path to the keystore containing the certificate
server.ssl.key-store=classpath:keystore/cybage-g6.p12
# The password used to generate the certificate
server.ssl.key-store-password=cybage123
# The alias mapped to the certificate
server.ssl.key-alias=g6
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false


## MULTIPART (MultipartProperties)
# Enable multipart uploads
spring.servlet.multipart.enabled=true
# Threshold after which files are written to disk.
spring.servlet.multipart.file-size-threshold=2KB
# Max file size.
spring.servlet.multipart.max-file-size=200MB
# Max Request Size
spring.servlet.multipart.max-request-size=215MB
## File Storage Properties
# All files uploaded through the REST API will be stored in this directory
file.upload-dir=C:/MajorFile/content